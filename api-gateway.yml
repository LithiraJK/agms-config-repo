server:
  port: 8080

spring:
  application:
    name: api-gateway
  cloud:
    gateway:
      routes:
        # Auth Service Routes
        - id: auth-service
          uri: lb://auth-service
          predicates:
            - Path=/auth-service/**

        # Zone Service Routes
        - id: zone-service
          uri: lb://zone-service
          predicates:
            - Path=/zone-service/**
          filters:
            - AuthenticationFilter

        # Automation Service Routes
        - id: automation-service
          uri: lb://automation-service
          predicates:
            - Path=/automation-service/**
          filters:
            - AuthenticationFilter

        # Crop Service Routes
        - id: crop-service
          uri: lb://crop-service
          predicates:
            - Path=/crop-service/**
          filters:
            - AuthenticationFilter

        # Sensor Telemetry Service Routes
        - id: sensor-telemetry-service
          uri: lb://sensor-telemetry-service
          predicates:
            - Path=/sensor-telemetry-service/**
          filters:
            - AuthenticationFilter

      # Global CORS configuration
      globalcors:
        corsConfigurations:
          '[/**]':
            allowedOrigins:
              - "http://localhost:3000"
              - "http://localhost:8080"
              - "*"
            allowedMethods:
              - GET
              - POST
              - PUT
              - DELETE
              - OPTIONS
            allowedHeaders: "*"
            allowCredentials: true

eureka:
  client:
    service-url:
      defaultZone: http://localhost:8761/eureka/
  instance:
    prefer-ip-address: true
    instance-id: ${spring.application.name}:${server.port}

logging:
  level:
    org.springframework.cloud.gateway: DEBUG
    org.springframework.web: DEBUG


