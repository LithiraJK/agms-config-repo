spring:
  application:
    name: api-gateway

    cloud:
      gateway:
        server:
            webflux:
                routes:
                  - id: zone-service
                    uri: lb://zone-service
                    predicates:
                      - Path=/zone-service/**

                  - id: automation-service
                    uri: lb://automation-service
                    predicates:
                      - Path=/automation-service/**

                  - id: crop-service
                    uri: lb://crop-service
                    predicates:
                      - Path=/crop-service/**

                  - id: sensor-telemetry-service
                    uri: lb://sensor-telemetry-service
                    predicates:
                      - Path=/sensor-telemetry-service/**


server:
  port: 8080

eureka:
  client:
    service-url:
        defaultZone: http://localhost:8761/eureka/
